<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUMO — Análisis Personal</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:      #0e0e0e;
  --surface: #1a1a1a;
  --surf2:   #222222;
  --border:  #2e2e2e;
  --orange:  #ff6b00;
  --orange2: #ff8c33;
  --yellow:  #ffd000;
  --green:   #2ecc71;
  --red:     #e74c3c;
  --red2:    #ff6b6b;
  --text:    #f0f0f0;
  --muted:   #888;
  --muted2:  #555;
}
body { background: var(--bg); color: var(--text); font-family: 'Nunito Sans', sans-serif; min-height: 100vh; }

/* ══ UPLOAD ══ */
#uploadScreen {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 40px 20px;
  position: relative; overflow: hidden;
}
.bg-shapes { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.bg-shape  { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12; }
.bg-shape.s1 { width: 500px; height: 500px; background: var(--orange); top: -150px; right: -100px; }
.bg-shape.s2 { width: 400px; height: 400px; background: var(--yellow); bottom: -100px; left: -80px; }

.upload-header { text-align: center; margin-bottom: 48px; }
.tumo-wordmark { font-family: 'Nunito', sans-serif; font-size: 52px; font-weight: 900; letter-spacing: -2px; color: var(--orange); line-height: 1; margin-bottom: 6px; }
.tumo-subtitle { font-size: 15px; font-weight: 600; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

.drop-card {
  background: var(--surface); border: 2px dashed var(--border); border-radius: 20px;
  padding: 56px 48px; text-align: center; width: min(540px, 100%);
  cursor: pointer; transition: all 0.25s;
}
.drop-card:hover, .drop-card.dragging { border-color: var(--orange); background: rgba(255,107,0,0.05); transform: translateY(-2px); }
.upload-emoji { font-size: 56px; margin-bottom: 20px; display: block; transition: transform 0.3s; }
.drop-card:hover .upload-emoji { transform: scale(1.1) rotate(-5deg); }
.drop-title { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 10px; }
.drop-desc  { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }
#fileInput  { display: none; }
.upload-cta { background: var(--orange); color: #fff; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; padding: 14px 32px; border-radius: 50px; border: none; cursor: pointer; transition: all 0.2s; }
.upload-cta:hover { background: var(--orange2); transform: scale(1.04); }

.error-toast { margin-top: 16px; background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.3); border-radius: 12px; padding: 12px 20px; font-size: 13px; font-weight: 600; color: var(--red2); display: none; max-width: 540px; text-align: center; }

/* ══ APP ══ */
#app { display: none; }

/* Nav */
.topnav {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
  height: 64px; position: sticky; top: 0; z-index: 200;
}
.nav-left  { display: flex; align-items: center; gap: 16px; }
.nav-brand { font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 900; color: var(--orange); letter-spacing: -1px; text-decoration: none; }
.nav-sep   { width: 1px; height: 28px; background: var(--border); }
.nav-page  { font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; color: var(--text); }
.nav-right { display: flex; align-items: center; gap: 10px; }
.nav-file  { font-size: 12px; font-weight: 600; color: var(--muted); background: var(--surf2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-btn   { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; }
.nav-btn:hover { border-color: var(--orange); color: var(--orange); }

.nav-links { display: flex; align-items: center; gap: 2px; }
.nav-link { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; color: var(--muted); text-decoration: none; padding: 8px 14px; border-radius: 8px; transition: all 0.15s; }
.nav-link:hover { color: var(--orange); background: rgba(255,107,0,0.08); }
.nav-link.active { color: var(--orange); background: rgba(255,107,0,0.1); }

/* Layout */
.layout { display: flex; min-height: calc(100vh - 64px); }

/* Sidebar */
.sidebar {
  width: 240px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border); padding: 20px 14px;
  position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-title { font-size: 11px; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.active-count { background: var(--orange); color: #fff; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 50px; }

.fgroup { margin-bottom: 18px; }
.fgroup-label { font-size: 11px; font-weight: 800; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.06em; }

/* Generic text filter */
.f-text { width: 100%; background: var(--surf2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Nunito Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 7px 10px; outline: none; transition: border-color 0.15s; }
.f-text:focus { border-color: var(--orange); }
.f-text::placeholder { color: var(--muted2); }

/* Range filter */
.range-pair { display: flex; gap: 6px; }
.range-half { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.range-lbl  { font-size: 10px; font-weight: 700; color: var(--muted2); }
.f-num { width: 100%; background: var(--surf2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; font-weight: 700; padding: 6px 8px; outline: none; transition: border-color 0.15s; }
.f-num:focus { border-color: var(--orange); }

/* Select filter */
.f-select { width: 100%; background: var(--surf2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Nunito Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 7px 10px; outline: none; cursor: pointer; transition: border-color 0.15s; }
.f-select:focus { border-color: var(--orange); }

.clear-btn { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; padding: 9px; border-radius: 10px; cursor: pointer; transition: all 0.15s; margin-top: 4px; }
.clear-btn:hover { border-color: var(--red2); color: var(--red2); }

/* Content */
.content { flex: 1; padding: 24px; min-width: 0; overflow: hidden; }

.results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.results-count  { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; }
.results-count span { color: var(--orange); }
.sort-wrap  { display: flex; align-items: center; gap: 8px; }
.sort-lbl   { font-size: 12px; font-weight: 700; color: var(--muted); }
.sort-sel   { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Nunito Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 7px 10px; border-radius: 8px; outline: none; cursor: pointer; }
.sort-sel:focus { border-color: var(--orange); }
.sort-dir   { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 15px; padding: 7px 11px; border-radius: 8px; cursor: pointer; transition: all 0.15s; line-height: 1; }
.sort-dir:hover { border-color: var(--orange); color: var(--orange); }

/* Table */
.table-wrap   { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--surf2); }
thead th { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; color: var(--muted); text-align: left; padding: 13px 16px; letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap; cursor: pointer; user-select: none; }
thead th:hover { color: var(--orange); }
thead th.col-sorted { color: var(--orange); }

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.03); }

td { padding: 11px 16px; font-size: 13px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.td-num { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; color: var(--orange); }
td.td-id  { color: var(--muted2); font-size: 12px; }

/* Pagination */
.pag { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-top: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
.pag-info { font-size: 13px; font-weight: 600; color: var(--muted); }
.pag-btns { display: flex; gap: 5px; }
.pag-btn { background: var(--surf2); border: 1px solid var(--border); color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
.pag-btn:hover:not(:disabled), .pag-btn.cur { background: var(--orange); border-color: var(--orange); color: #fff; }
.pag-btn:disabled { opacity: 0.3; cursor: default; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.3s ease forwards; }

@media(max-width:700px){ .sidebar { display: none; } .content { padding: 14px; } }
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-brand">TUMO</div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">📊 Dashboard</a>
    <a href="analisis_personal.html" class="nav-link active">👤 Análisis</a>
    <a href="tumo_roster.html" class="nav-link">📋 Roster</a>
  </div>
  <div class="nav-right">
    <div class="nav-file" id="navFile" style="display:none"></div>
    <button class="nav-btn" id="navReload" onclick="resetToUpload()" style="display:none">↩ Nuevo archivo</button>
  </div>
</nav>

<!-- ══ UPLOAD ══ -->
<div id="uploadScreen" style="min-height:calc(100vh - 64px)">
  <div class="bg-shapes"><div class="bg-shape s1"></div><div class="bg-shape s2"></div></div>
  <div class="upload-header">
    <div class="tumo-wordmark">TUMO</div>
    <div class="tumo-subtitle">Montevideo · Análisis Personal</div>
  </div>
  <div class="drop-card" id="dropZone">
    <input type="file" id="fileInput" accept=".csv">
    <span class="upload-emoji">📊</span>
    <div class="drop-title">Subí el archivo de estudiantes</div>
    <div class="drop-desc">Arrastrá el CSV acá o hacé click.<br>Se generan filtros automáticos para cada columna.</div>
    <button class="upload-cta" onclick="document.getElementById('fileInput').click()">Elegir archivo CSV</button>
  </div>
  <div class="error-toast" id="errorToast"></div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-title">
        Filtros
        <span class="active-count" id="activeCount" style="display:none">0</span>
      </div>
      <div id="filtersPanel"></div>
      <button class="clear-btn" onclick="clearAll()">✕ Limpiar filtros</button>
    </aside>

    <!-- Content -->
    <div class="content">
      <div class="results-header">
        <div class="results-count">Mostrando <span id="resultCount">0</span> de <span id="totalCount">0</span> alumnos</div>
        <div class="sort-wrap">
          <div class="sort-lbl">Ordenar:</div>
          <select class="sort-sel" id="sortCol" onchange="render()"></select>
          <button class="sort-dir" id="sortDirBtn" onclick="toggleDir()">↓</button>
        </div>
      </div>

      <div class="table-wrap fade-up">
        <div class="table-scroll">
          <table>
            <thead id="thead"><tr></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="pag">
          <span class="pag-info" id="pagInfo"></span>
          <div class="pag-btns">
            <button class="pag-btn" id="prevBtn" onclick="goPage(page-1)">← Ant</button>
            <span id="pagNums" class="pag-btns"></span>
            <button class="pag-btn" id="nextBtn" onclick="goPage(page+1)">Sig →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── State ── */
let allData = [], cols = [], filtered = [];
let sortCol = '', sortDir = -1, page = 1;
const PAGE = 30;

/* ── Upload ── */
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragging'); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if(fileInput.files[0]) processFile(fileInput.files[0]); });

function showError(msg) { const el = document.getElementById('errorToast'); el.textContent = '⚠ ' + msg; el.style.display = 'block'; }

function processFile(file) {
  document.getElementById('errorToast').style.display = 'none';
  if (!file.name.toLowerCase().endsWith('.csv')) { showError('El archivo tiene que ser .csv'); return; }
  const r = new FileReader();
  r.onload = e => parseAndLoad(e.target.result, file.name);
  r.readAsText(file, 'UTF-8');
}

function splitLine(line) {
  const res = []; let cur = '', inQ = false;
  for (const ch of line) {
    if (ch === '"') inQ = !inQ;
    else if (ch === ',' && !inQ) { res.push(cur); cur = ''; }
    else cur += ch;
  }
  res.push(cur); return res;
}

function parseAndLoad(text, fname) {
  const lines = text.replace(/\r/g, '').split('\n').filter(l => l.trim());
  if (lines.length < 2) { showError('El archivo está vacío.'); return; }

  const headers = splitLine(lines[0]).map(h => h.trim().replace(/^"|"$/g, ''));
  if (!headers.length) { showError('No se encontraron columnas.'); return; }

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = splitLine(lines[i]);
    if (cells.every(c => !c.trim())) continue;
    const row = {};
    headers.forEach((h, j) => { row[h] = (cells[j] || '').trim().replace(/^"|"$/g, ''); });
    rows.push(row);
  }
  if (!rows.length) { showError('No hay filas de datos.'); return; }

  allData = rows;
  cols    = analyzeColumns(headers, rows);
  sortCol = cols[0]?.key || '';
  page    = 1;

  document.getElementById('navFile').textContent = fname;
  document.getElementById('navFile').style.display = '';
  document.getElementById('navReload').style.display = '';
  document.getElementById('uploadScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  buildSortSelect();
  buildFilters();
  applyAndRender();
}

function resetToUpload() {
  document.getElementById('uploadScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('navFile').style.display = 'none';
  document.getElementById('navReload').style.display = 'none';
  fileInput.value = '';
  allData = []; cols = [];
}

/* ── Column analysis ── */
function analyzeColumns(headers, rows) {
  return headers.map(key => {
    const vals = rows.map(r => r[key]).filter(v => v !== '');
    const nums = vals.map(v => parseFloat(v.replace(/,/g, '.'))).filter(n => !isNaN(n));
    const isNumeric = nums.length > 0 && nums.length / Math.max(vals.length, 1) > 0.85;
    const unique = [...new Set(vals)].sort();
    const isCat  = !isNumeric && unique.length > 0 && unique.length <= 20;
    return {
      key,
      type: isNumeric ? 'num' : isCat ? 'cat' : 'text',
      unique,
      min: isNumeric ? Math.min(...nums) : null,
      max: isNumeric ? Math.max(...nums) : null,
    };
  });
}

/* ── Sidebar filters ── */
function buildFilters() {
  const panel = document.getElementById('filtersPanel');
  panel.innerHTML = cols.map(col => {
    if (col.type === 'num') {
      return `<div class="fgroup">
        <div class="fgroup-label">${col.key}</div>
        <div class="range-pair">
          <div class="range-half">
            <div class="range-lbl">Mín</div>
            <input class="f-num" type="number" id="fmin-${esc(col.key)}" placeholder="${col.min ?? ''}" oninput="applyAndRender()">
          </div>
          <div class="range-half">
            <div class="range-lbl">Máx</div>
            <input class="f-num" type="number" id="fmax-${esc(col.key)}" placeholder="${col.max ?? ''}" oninput="applyAndRender()">
          </div>
        </div>
      </div>`;
    }
    if (col.type === 'cat') {
      const opts = col.unique.map(v => `<option value="${htmlEsc(v)}">${v || '(vacío)'}</option>`).join('');
      return `<div class="fgroup">
        <div class="fgroup-label">${col.key}</div>
        <select class="f-select" id="fcat-${esc(col.key)}" onchange="applyAndRender()">
          <option value="">— Todos —</option>
          ${opts}
        </select>
      </div>`;
    }
    return `<div class="fgroup">
      <div class="fgroup-label">${col.key}</div>
      <input class="f-text" type="text" id="ftxt-${esc(col.key)}" placeholder="Buscar..." oninput="applyAndRender()">
    </div>`;
  }).join('');
}

function esc(s)     { return CSS.escape(s); }
function htmlEsc(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getFilterValues() {
  const active = [];
  const vals = {};
  cols.forEach(col => {
    if (col.type === 'num') {
      const mn = document.getElementById('fmin-'+esc(col.key))?.value;
      const mx = document.getElementById('fmax-'+esc(col.key))?.value;
      vals[col.key] = { type: 'num', min: mn !== '' && mn != null ? parseFloat(mn) : -Infinity, max: mx !== '' && mx != null ? parseFloat(mx) : Infinity };
      if (mn !== '' || mx !== '') active.push(col.key);
    } else if (col.type === 'cat') {
      const v = document.getElementById('fcat-'+esc(col.key))?.value || '';
      vals[col.key] = { type: 'cat', val: v };
      if (v !== '') active.push(col.key);
    } else {
      const v = (document.getElementById('ftxt-'+esc(col.key))?.value || '').toLowerCase().trim();
      vals[col.key] = { type: 'text', val: v };
      if (v !== '') active.push(col.key);
    }
  });
  return { vals, active };
}

function applyAndRender() {
  const { vals, active } = getFilterValues();

  const cnt = document.getElementById('activeCount');
  cnt.textContent = active.length;
  cnt.style.display = active.length ? 'inline' : 'none';

  filtered = allData.filter(row => {
    for (const col of cols) {
      const f = vals[col.key];
      const rawVal = row[col.key] ?? '';
      if (f.type === 'num') {
        const n = parseFloat(rawVal.replace(/,/g, '.'));
        if (!isNaN(n) && (n < f.min || n > f.max)) return false;
      } else if (f.type === 'cat') {
        if (f.val !== '' && rawVal !== f.val) return false;
      } else {
        if (f.val && !rawVal.toLowerCase().includes(f.val)) return false;
      }
    }
    return true;
  });

  page = Math.max(1, Math.min(page, Math.ceil(filtered.length / PAGE) || 1));
  render();
}

function clearAll() {
  cols.forEach(col => {
    if (col.type === 'num') {
      const mn = document.getElementById('fmin-'+esc(col.key));
      const mx = document.getElementById('fmax-'+esc(col.key));
      if (mn) mn.value = '';
      if (mx) mx.value = '';
    } else if (col.type === 'cat') {
      const el = document.getElementById('fcat-'+esc(col.key));
      if (el) el.value = '';
    } else {
      const el = document.getElementById('ftxt-'+esc(col.key));
      if (el) el.value = '';
    }
  });
  page = 1;
  applyAndRender();
}

/* ── Sort ── */
function buildSortSelect() {
  const sel = document.getElementById('sortCol');
  sel.innerHTML = cols.map(c => `<option value="${htmlEsc(c.key)}">${c.key}</option>`).join('');
  sel.value = sortCol || cols[0]?.key || '';
}

function toggleDir() {
  sortDir *= -1;
  document.getElementById('sortDirBtn').textContent = sortDir === -1 ? '↓' : '↑';
  render();
}

function colSort(key) {
  if (sortCol === key) sortDir *= -1; else { sortCol = key; sortDir = -1; }
  document.getElementById('sortCol').value = key;
  document.getElementById('sortDirBtn').textContent = '↓';
  render();
}

function goPage(p) {
  const max = Math.max(1, Math.ceil(filtered.length / PAGE));
  page = Math.max(1, Math.min(p, max));
  render();
}

/* ── Render ── */
function render() {
  sortCol = document.getElementById('sortCol').value;

  const sorted = [...filtered].sort((a, b) => {
    const av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
    const an = parseFloat(av), bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) return (an - bn) * sortDir;
    return av.localeCompare(bv, 'es', { sensitivity: 'base' }) * sortDir * -1;
  });

  /* Header */
  document.getElementById('thead').innerHTML = '<tr>' +
    cols.map(c => `<th onclick="colSort('${c.key.replace(/'/g,"\\'")}')">
      ${htmlEsc(c.key)} ${sortCol === c.key ? (sortDir === -1 ? '↓' : '↑') : ''}
    </th>`).join('') + '</tr>';

  /* Body */
  const start = (page - 1) * PAGE;
  const slice = sorted.slice(start, start + PAGE);
  const tbody = document.getElementById('tbody');

  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="${cols.length}" style="text-align:center;color:var(--muted);padding:50px;font-size:14px;font-weight:700;">Sin resultados 🔍</td></tr>`;
  } else {
    tbody.innerHTML = slice.map(row =>
      '<tr>' + cols.map(col => {
        const v = row[col.key] ?? '';
        const cls = col.type === 'num' ? ' class="td-num"' : '';
        return `<td${cls} title="${htmlEsc(v)}">${htmlEsc(v) || '<span style="color:var(--muted2)">—</span>'}</td>`;
      }).join('') + '</tr>'
    ).join('');
  }

  /* Counts & pagination */
  document.getElementById('resultCount').textContent = filtered.length;
  document.getElementById('totalCount').textContent  = allData.length;

  const maxPage = Math.max(1, Math.ceil(filtered.length / PAGE));
  document.getElementById('pagInfo').textContent =
    filtered.length
      ? `Mostrando ${start+1}–${Math.min(start+PAGE, filtered.length)} de ${filtered.length}`
      : '';
  document.getElementById('prevBtn').disabled = page <= 1;
  document.getElementById('nextBtn').disabled = page >= maxPage;

  let nums = '';
  for (let p = Math.max(1, page-2); p <= Math.min(maxPage, page+2); p++) {
    nums += `<button class="pag-btn${p===page?' cur':''}" onclick="goPage(${p})">${p}</button>`;
  }
  document.getElementById('pagNums').innerHTML = nums;
}
</script>
</body>
</html>
